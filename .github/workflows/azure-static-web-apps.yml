name: Deploy Frontend to Azure Static Web Apps

# Replaces Vercel deployment. Deploys frontend/ (React + Vite) to Azure Static Web Apps.
#
# Required GitHub secret:
#   AZURE_STATIC_WEB_APPS_API_TOKEN  — copy from SWA resource > Manage deployment token
#
# Required GitHub repository variable (Settings > Secrets and variables > Variables):
#   VITE_API_BASE_URL  — e.g. https://fraud-detection-api-<initials>.azurewebsites.net
#   (no trailing slash; must match the backend CORS_ORIGINS App Setting exactly)
#
# SWA resource must be created in the Azure portal with source = "Other"
# so Azure does NOT auto-commit its own workflow — this file owns the CI/CD.

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    # Skip this job when a PR is merged (closed + merged) — handled by the main push trigger.
    # Only run for closed-but-not-merged PRs to clean up preview environments.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action == 'closed')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # app_location is the root of the frontend source; Oryx (SWA's build engine)
          # runs `npm ci && npm run build` here automatically.
          app_location: "frontend"
          # output_location is relative to app_location — the Vite build output dir.
          output_location: "dist"
          # api_location is intentionally omitted — no Azure Functions backend here.
        env:
          # VITE_* env vars must be provided at BUILD time so Vite can inline them.
          # SWA app settings (runtime) do NOT reach the static Vite build.
          # Set VITE_API_BASE_URL as a GitHub repository variable under
          # Settings > Secrets and variables > Variables.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

  close_pull_request:
    name: Close Pull Request Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
